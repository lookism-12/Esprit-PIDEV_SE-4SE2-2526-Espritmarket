# ============================================
# ESPRIT MARKET - Docker Compose (Local Dev)
# ============================================
# Use this for local development/testing before K8s deployment

version: '3.8'

services:
  # Frontend - Angular served by Nginx
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: esprit-market-frontend
    ports:
      - "80:80"
    environment:
      - ENVIRONMENT=development
    depends_on:
      - backend
    networks:
      - esprit-market-network
    restart: unless-stopped

  # Backend - Spring Boot
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: esprit-market-backend
    ports:
      - "8089:8089"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8089
      - SPRING_DATA_MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/esprit_market}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-here-min-256-bits}
      - JWT_EXPIRATION_MS=86400000
      - APP_UPLOAD_DIR=/app/uploads
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_CURRENCY=${STRIPE_CURRENCY:-tnd}
      - STRIPE_AMOUNT_MULTIPLIER=${STRIPE_AMOUNT_MULTIPLIER:-100}
      - STRIPE_REQUEST_THREE_D_SECURE=${STRIPE_REQUEST_THREE_D_SECURE:-any}
      - CARD_OTP_TTL_MINUTES=${CARD_OTP_TTL_MINUTES:-5}
      - VONAGE_API_KEY=${VONAGE_API_KEY:-}
      - VONAGE_API_SECRET=${VONAGE_API_SECRET:-}
      - VONAGE_SMS_FROM=${VONAGE_SMS_FROM:-}
      - OTP_RECEIVER_PHONE_NUMBER=${OTP_RECEIVER_PHONE_NUMBER:-}
      - FORUM_AI_BASE_URL=http://forum-ai:8001
    volumes:
      - backend-uploads:/app/uploads
    networks:
      - esprit-market-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/api/users"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # Forum AI Recommendation Service - FastAPI
  forum-ai:
    build:
      context: ../ai-forum-recommendation
      dockerfile: Dockerfile
    container_name: esprit-market-forum-ai
    ports:
      - "8001:8001"
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/esprit_market}
      - MONGODB_DATABASE=esprit_market
      - FORUM_AI_ARTIFACT_DIR=artifacts
      - FORUM_AI_EMBEDDING_MODEL=${FORUM_AI_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    depends_on:
      - mongo
    networks:
      - esprit-market-network
    restart: unless-stopped

  # MongoDB (optional - for local dev only)
  mongo:
    image: mongo:6
    container_name: esprit-market-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=esprit_market
    volumes:
      - mongo-data:/data/db
    networks:
      - esprit-market-network
    restart: unless-stopped

networks:
  esprit-market-network:
    driver: bridge

volumes:
  backend-uploads:
  mongo-data:
