# ============================================
# ESPRIT MARKET - ConfigMap & Secrets
# ============================================

# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: esprit-market-config
  namespace: esprit-market
data:
  cors-origins: "http://localhost:4200,http://esprit-market-frontend,http://esprit-market-frontend:80"
  logging-level: "INFO"
  spring-profiles: "production"
  stripe-currency: "tnd"
  stripe-amount-multiplier: "100"
  stripe-request-three-d-secure: "any"
  card-otp-ttl-minutes: "5"

---
# Secrets for sensitive data
# NOTE: Replace placeholder values before deploying!
# To create secret from command line:
# kubectl create secret generic esprit-market-secrets \
#   --from-literal=mongodb-uri='mongodb+srv://user:pass@cluster.mongodb.net/dbname' \
#   --from-literal=jwt-secret='your-256-bit-secret-key' \
#   --from-literal=stripe-secret-key='sk_live_...' \
#   --from-literal=stripe-publishable-key='pk_live_...' \
#   --from-literal=vonage-api-key='...' \
#   --from-literal=vonage-api-secret='...' \
#   --from-literal=vonage-sms-from='EspritMarket' \
#   --from-literal=otp-receiver-phone-number='+21620123456' \
#   -n esprit-market
apiVersion: v1
kind: Secret
metadata:
  name: esprit-market-secrets
  namespace: esprit-market
type: Opaque
stringData:
  # IMPORTANT: Replace these values with real credentials before deploying
  mongodb-uri: "mongodb+srv://REPLACE_USER:REPLACE_PASSWORD@cluster.mongodb.net/esprit_market"
  jwt-secret: "REPLACE_WITH_YOUR_256_BIT_SECRET_KEY_HERE_MINIMUM_32_CHARACTERS"
  stripe-secret-key: "sk_live_..."
  stripe-publishable-key: "pk_live_..."
  vonage-api-key: ""
  vonage-api-secret: ""
  vonage-sms-from: "EspritMarket"
  otp-receiver-phone-number: ""
