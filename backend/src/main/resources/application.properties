# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://admin:admin@espritmarket.pm6cdbe.mongodb.net/esprit_market?retryWrites=true&w=majority}

# JWT Configuration
jwt.secret=${JWT_SECRET:espritmarket_secure_jwt_secret_key_2024_03_26_v1_long_enough_for_hs256}
jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}

# Server Config
server.port=${SERVER_PORT:8090}

# Logging Levels
logging.level.esprit_market=${LOGGING_LEVEL_ESPRIT_MARKET:DEBUG}
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}

# File Upload Configuration
app.upload.dir=${APP_UPLOAD_DIR:uploads/avatars}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# Application Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:development}

# Relational datasource for negotiation/notification JPA module.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:espritmarket;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
