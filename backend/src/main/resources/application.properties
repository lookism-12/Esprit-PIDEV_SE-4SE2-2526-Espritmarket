app prop 

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:}

# JWT Configuration
jwt.secret=${JWT_SECRET:}
jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}

# Server Config
server.port=${SERVER_PORT:8090}

# Logging Levels
logging.level.esprit_market=${LOGGING_LEVEL_ESPRIT_MARKET:DEBUG}
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}

# File Upload Configuration
app.upload.dir=${APP_UPLOAD_DIR:uploads/avatars}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# Application Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:development}

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ML Recommendation Service Configuration
app.ml-service.base-url=${ML_SERVICE_BASE_URL:http://127.0.0.1:8001}
app.ml-service.timeout-seconds=${ML_SERVICE_TIMEOUT_SECONDS:30}
app.ml-service.max-retries=${ML_SERVICE_MAX_RETRIES:3}
app.ml-service.enabled=${ML_SERVICE_ENABLED:true}
app.ml-service.use-fallback=${ML_SERVICE_USE_FALLBACK:true}

# AI Delivery ETA + Weather Risk Tracking
app.delivery-eta.open-weather-base-url=${OPENWEATHER_BASE_URL:https://api.openweathermap.org}
app.delivery-eta.open-weather-api-key=${OPENWEATHER_API_KEY:}
app.delivery-eta.osrm-base-url=${OSRM_BASE_URL:https://router.project-osrm.org}
app.delivery-eta.ml-base-url=${DELIVERY_ETA_ML_BASE_URL:http://127.0.0.1:8000}
app.delivery-eta.timeout-seconds=${DELIVERY_ETA_TIMEOUT_SECONDS:5}
app.delivery-eta.use-ml=${DELIVERY_ETA_USE_ML:true}
app.delivery-eta.use-external-routing=${DELIVERY_ETA_USE_EXTERNAL_ROUTING:true}
app.delivery-eta.use-external-weather=${DELIVERY_ETA_USE_EXTERNAL_WEATHER:true}

# AI Forum Recommendation Service
app.forum-ai.base-url=${FORUM_AI_BASE_URL:http://127.0.0.1:8001}
app.forum-ai.timeout-seconds=${FORUM_AI_TIMEOUT_SECONDS:8}
app.forum-ai.max-retries=${FORUM_AI_MAX_RETRIES:1}
app.forum-ai.enabled=${FORUM_AI_ENABLED:true}
app.forum-ai.default-top-k=${FORUM_AI_DEFAULT_TOP_K:5}



# Twilio SMS configuration. Credentials come from environment variables or local .env.
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.service-sid=${TWILIO_SERVICE_SID:}
twilio.otp-receiver-phone-number=${OTP_RECEIVER_PHONE_NUMBER:}
# Internal card OTP flow. The backend generates the code and Twilio sends it.
payment.card-otp.ttl-minutes=${CARD_OTP_TTL_MINUTES:5}
