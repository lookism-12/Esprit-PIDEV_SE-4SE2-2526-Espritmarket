@if (!isAdminRoute()) {
  <app-navbar></app-navbar>
}
<main [style]="isAdminRoute() ? '' : 'min-height:calc(100vh - 80px - 400px)'">
  <router-outlet></router-outlet>
</main>
@if (!isAdminRoute()) {
  <app-footer></app-footer>
}

<!-- Toast Container -->
<app-toast-container></app-toast-container>

<!-- Cart Expiration Alert (only for authenticated customers) -->
@if (!isAdminRoute() && !isAuthRoute()) {
  <app-cart-expiration-alert></app-cart-expiration-alert>
}
