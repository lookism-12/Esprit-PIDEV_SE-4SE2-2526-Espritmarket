<header class="bg-gradient-header h-16 flex items-center justify-between px-6 shadow-md z-20">
    <!-- Left Section -->
    <div class="flex items-center gap-4">
        <div class="md:hidden">
            <button class="text-white hover:text-gray-200 transition-colors">
                ☰
            </button>
        </div>
        <h2 class="text-lg font-bold text-white tracking-wide">Admin Dashboard</h2>
    </div>

    <!-- Right Section -->
    <div class="flex items-center gap-4">
        <!-- Search Bar -->
        <div class="relative hidden lg:block">
            <input type="text" placeholder="Search..."
                class="bg-white/10 border border-white/20 rounded-full px-4 py-1.5 pl-10 text-sm text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-white/50 w-64 transition-all" />
            <span class="absolute left-3 top-2 text-gray-300">🔍</span>
        </div>

        <div class="h-6 w-px bg-white/20 mx-2 hidden md:block"></div>

        <!-- Icons -->
        <div class="flex items-center space-x-3 text-white">
            <button class="p-1 hover:bg-white/10 rounded-full transition-colors relative">
                🔔
                <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
            </button>
            <button class="p-1 hover:bg-white/10 rounded-full transition-colors">
                ✉️
            </button>
        </div>

        <!-- User Profile Dropdown -->
        <div class="relative ml-2">
            <button 
                (click)="toggleProfileMenu()"
                class="flex items-center gap-2 cursor-pointer hover:bg-white/10 rounded-full px-2 py-1 transition-colors">
                <div
                    class="w-8 h-8 rounded-full bg-white text-primary font-bold flex items-center justify-center border-2 border-white/50">
                    {{ userInitials() }}
                </div>
                <span class="text-white/80 hidden md:block">▼</span>
            </button>

            <!-- Dropdown Menu -->
            @if (showProfileMenu()) {
                <div class="absolute right-0 mt-2 w-64 bg-white rounded-xl shadow-2xl border border-gray-200 overflow-hidden z-50 animate-fade-in">
                    <!-- User Info -->
                    <div class="p-4 bg-gradient-to-r from-primary to-primary-dark text-white">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-white text-primary font-bold flex items-center justify-center text-lg">
                                {{ userInitials() }}
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="font-bold text-sm truncate">{{ userName() }}</p>
                                <p class="text-xs opacity-90 truncate">{{ userEmail() }}</p>
                            </div>
                        </div>
                    </div>

                    <!-- Menu Items -->
                    <div class="py-2">
                        <a 
                            routerLink="/admin/profile"
                            (click)="toggleProfileMenu()"
                            class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors cursor-pointer">
                            <span class="text-lg">👤</span>
                            <div>
                                <p class="text-sm font-semibold text-gray-900">My Profile</p>
                                <p class="text-xs text-gray-500">View and edit profile</p>
                            </div>
                        </a>

                        <a 
                            routerLink="/admin/settings"
                            (click)="toggleProfileMenu()"
                            class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors cursor-pointer">
                            <span class="text-lg">⚙️</span>
                            <div>
                                <p class="text-sm font-semibold text-gray-900">Settings</p>
                                <p class="text-xs text-gray-500">System preferences</p>
                            </div>
                        </a>

                        <div class="border-t border-gray-200 my-2"></div>

                        <button 
                            (click)="logout()"
                            class="w-full flex items-center gap-3 px-4 py-3 hover:bg-red-50 transition-colors text-left">
                            <span class="text-lg">🚪</span>
                            <div>
                                <p class="text-sm font-semibold text-red-600">Logout</p>
                                <p class="text-xs text-red-500">Sign out from admin panel</p>
                            </div>
                        </button>
                    </div>
                </div>
            }
        </div>
    </div>
</header>
