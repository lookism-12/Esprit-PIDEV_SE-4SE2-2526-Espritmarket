<!-- Primary Metrics Row (4 Cards) -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6 mt-4 animate-fade-in">
  <app-metric-card *ngFor="let metric of metrics" [data]="metric"></app-metric-card>
</div>

<!-- Main Content Grid (3 Columns) -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  
  <!-- Calendar Section (Now smaller, spanning only 1 column) -->
  <div class="bg-white rounded-xl border border-[#7D0408] overflow-hidden shadow-sm flex flex-col h-full">
    <div class="p-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/30">
      <h3 class="text-sm font-bold text-gray-800">Calendar & Attendance</h3>
      <div class="flex gap-1.5">
        <button (click)="prevMonth()" class="w-6 h-6 rounded-full bg-[#7D0408] text-white flex items-center justify-center text-[10px] shadow-sm hover:opacity-90">
          <span class="rotate-180">➜</span>
        </button>
        <button (click)="nextMonth()" class="w-6 h-6 rounded-full bg-[#7D0408] text-white flex items-center justify-center text-[10px] shadow-sm hover:opacity-90">
          <span>➜</span>
        </button>
      </div>
    </div>
    <div class="p-4 flex-1">
      <div class="text-center mb-4">
        <span class="text-[10px] font-bold text-gray-900 uppercase tracking-widest">{{ calendarMonthYear() }}</span>
      </div>
      
      <!-- Mock Calendar UI (Compact) -->
      <div class="grid grid-cols-7 gap-0.5 text-center">
        <div *ngFor="let day of ['S', 'M', 'T', 'W', 'T', 'F', 'S']" class="text-[10px] font-bold text-gray-400 py-1">{{day}}</div>
        
        <!-- Calendar Days -->
        <div *ngFor="let dayObj of calendarDays()" 
             class="w-7 h-7 mx-auto flex items-center justify-center text-[11px] font-medium rounded-full cursor-pointer transition-colors relative"
             [ngClass]="{
               'text-gray-300 opacity-40': !dayObj.currentMonth,
               'bg-[#7D0408] text-white shadow-sm font-bold': dayObj.isToday,
               'hover:bg-gray-100 text-gray-700': !dayObj.isToday && dayObj.currentMonth,
               'text-gray-400': !dayObj.isToday && !dayObj.currentMonth
             }">
          {{ dayObj.day }}
          <span *ngIf="dayObj.isToday" class="absolute -top-0.5 -right-0.5 w-1.5 h-1.5 bg-white rounded-full border border-[#7D0408]"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- School Performance Section -->
  <div class="bg-white rounded-xl border border-[#7D0408] overflow-hidden shadow-sm flex flex-col h-full">
    <div class="p-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/30">
      <h3 class="text-sm font-bold text-gray-800">Market Performance</h3>
      <span class="text-[9px] text-gray-400 font-medium">Data in %</span>
    </div>
    <div class="p-4 flex-1 flex flex-col">
      <div class="flex justify-between items-center mb-6 text-[9px] font-bold gap-2">
        <div class="flex items-center gap-1.5 text-red-900">
          <span class="w-2 h-2 rounded-full bg-[#7D0408]"></span> Listings
        </div>
        <div class="flex items-center gap-1.5 text-[#C5A023]">
          <span class="w-2 h-2 rounded-full bg-[#C5A023]"></span> Sales
        </div>
        <div class="flex items-center gap-1.5 text-cyan-600">
          <span class="w-2 h-2 rounded-full bg-[#508D96]"></span> Conversion
        </div>
      </div>
      
      <div class="flex-1 flex items-end justify-around gap-2 px-2 relative min-h-[100px]">
        <div class="absolute inset-0 flex flex-col justify-between py-1 opacity-10 pointer-events-none">
          <div class="w-full h-px bg-gray-400"></div>
          <div class="w-full h-px bg-gray-400"></div>
          <div class="w-full h-px bg-gray-400"></div>
        </div>
        
        <div class="w-6 bg-[#7D0408] rounded-t-sm relative group" style="height: 75%;">
          <span class="absolute -top-4 left-1/2 -translate-x-1/2 text-[8px] font-bold opacity-0 group-hover:opacity-100 transition-opacity bg-black text-white px-1 rounded">75</span>
        </div>
        <div class="w-6 bg-[#C5A023] rounded-t-sm relative group" style="height: 55%;">
           <span class="absolute -top-4 left-1/2 -translate-x-1/2 text-[8px] font-bold opacity-0 group-hover:opacity-100 transition-opacity bg-black text-white px-1 rounded">55</span>
        </div>
        <div class="w-6 bg-[#508D96] rounded-t-sm relative group" style="height: 65%;">
           <span class="absolute -top-4 left-1/2 -translate-x-1/2 text-[8px] font-bold opacity-0 group-hover:opacity-100 transition-opacity bg-black text-white px-1 rounded">65</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Activities Notification -->
  <div class="bg-white rounded-xl border border-[#7D0408] overflow-hidden shadow-sm h-full flex flex-col">
    <div class="p-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/30">
      <h3 class="text-sm font-bold text-gray-800">Recent Logs</h3>
      <button class="px-3 py-1 text-[10px] font-bold text-cyan-600 border border-cyan-600 rounded-full hover:bg-cyan-50">View All</button>
    </div>
    <div class="p-4 space-y-4 flex-1 overflow-y-auto max-h-[250px] hide-scrollbar">
      <div *ngFor="let activity of recentActivities.slice(0,3)" class="space-y-1">
        <div class="flex justify-between items-start">
          <h4 class="text-[11px] font-bold text-gray-900 leading-tight">{{activity.title}}</h4>
          <span class="text-[8px] font-bold text-gray-400 bg-gray-50 px-1 py-0.5 rounded shrink-0 ml-2">{{activity.time}}</span>
        </div>
        <p class="text-[10px] text-gray-500 line-clamp-2 leading-relaxed">{{activity.description}}</p>
        <div class="h-px bg-gray-50 mt-2"></div>
      </div>
    </div>
  </div>

</div>

<!-- Actionable Alerts Section -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
  <div *ngFor="let alert of actionableAlerts" 
       [ngClass]="alert.color"
       [routerLink]="alert.route"
       class="rounded-xl p-5 flex items-center gap-5 text-white relative shadow-sm hover:shadow-lg transition-all transform hover:-translate-y-1 cursor-pointer group overflow-hidden border border-black/10">
       
    <!-- Decorative Circle -->
    <div class="absolute -top-6 -right-6 w-16 h-16 bg-white/10 rounded-full blur-xl group-hover:scale-150 transition-transform"></div>
    
    <!-- Large Icon -->
    <div class="w-14 h-14 rounded-2xl bg-white/20 flex items-center justify-center text-3xl shadow-inner border border-white/20">
      {{alert.icon}}
    </div>
    
    <div class="flex-1">
      <h4 class="text-[12px] font-bold uppercase tracking-widest opacity-80">{{alert.title}}</h4>
      <div class="flex items-baseline gap-2 mt-1">
        <span class="text-3xl font-extrabold">{{alert.value}}</span>
        <span class="text-[10px] font-bold opacity-0 group-hover:opacity-100 transition-opacity">➜</span>
      </div>
      <p class="text-[10px] font-medium mt-1 opacity-70">{{alert.subtitle}}</p>
    </div>
  </div>
</div>
