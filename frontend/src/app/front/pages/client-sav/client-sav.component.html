<div class="min-h-screen bg-gray-50 pt-24 pb-12 font-sans relative overflow-hidden">
  <!-- Dynamic Gradient Background Effects -->
  <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden h-[50vh]">
    <div class="absolute -top-40 right-10 w-96 h-96 bg-primary/10 rounded-full blur-3xl opacity-70"></div>
    <div class="absolute top-40 -left-20 w-72 h-72 bg-purple-500/10 rounded-full blur-3xl opacity-60"></div>
  </div>

  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <!-- Header Section -->
    <div class="mb-10 text-center">
      <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight leading-none mb-4">
        Support <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-purple-600">Services</span>
      </h1>
      <p class="text-lg text-gray-500 font-medium max-w-2xl mx-auto">
        Track your deliveries in real-time and submit feedback or claims regarding your purchases.
      </p>
    </div>

    <!-- Navigation Tabs -->
    <div class="flex justify-center mb-8 relative z-20">
      <div class="inline-flex bg-white/60 backdrop-blur-md p-1.5 rounded-2xl shadow-sm border border-black/5">
        <button (click)="setActiveTab('deliveries')"
                [class.bg-white]="activeTab() === 'deliveries'"
                [class.text-primary-dark]="activeTab() === 'deliveries'"
                [class.shadow-sm]="activeTab() === 'deliveries'"
                [class.text-gray-500]="activeTab() !== 'deliveries'"
                [class.hover:text-gray-700]="activeTab() !== 'deliveries'"
                class="px-8 py-3 rounded-xl font-bold text-sm transition-all duration-200 flex items-center gap-2">
          <span>📦</span>
          My Deliveries
        </button>
        <button (click)="setActiveTab('feedback')"
                [class.bg-white]="activeTab() === 'feedback'"
                [class.text-primary-dark]="activeTab() === 'feedback'"
                [class.shadow-sm]="activeTab() === 'feedback'"
                [class.text-gray-500]="activeTab() !== 'feedback'"
                [class.hover:text-gray-700]="activeTab() !== 'feedback'"
                class="px-8 py-3 rounded-xl font-bold text-sm transition-all duration-200 flex items-center gap-2">
          <span>🎧</span>
          Support & Reviews
        </button>
      </div>
    </div>

    <!-- Content Area -->
    <div class="bg-transparent mt-4">
      @if (activeTab() === 'deliveries') {
        <app-client-delivery class="animate-fade-in block"></app-client-delivery>
      } @else {
        <app-client-feedback class="animate-fade-in block"></app-client-feedback>
      }
    </div>
  </div>
</div>

<style>
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in {
    animation: fade-in 0.3s ease-out forwards;
  }
</style>
