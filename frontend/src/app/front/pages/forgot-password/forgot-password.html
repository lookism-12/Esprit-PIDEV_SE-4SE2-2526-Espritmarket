<div class="relative min-h-[calc(100vh-200px)] flex items-center justify-center bg-gray-100 overflow-hidden">
  <div class="absolute inset-0 z-0 overflow-hidden">
    <video autoplay loop muted playsinline class="w-full h-full object-cover">
      <source src="assets/Video%20Publicitaire.mp4" type="video/mp4">
    </video>
    <div class="absolute inset-0 bg-black/40 backdrop-blur-[2px]"></div>
  </div>

  <div class="relative z-10 w-full max-w-[400px] px-6">
    <div class="rounded-[32px] p-8 border border-white/40 shadow-2xl backdrop-blur-xl bg-white/90">

      <!-- Header -->
      <div class="mb-8 text-center">
        <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
          </svg>
        </div>
        <h1 class="text-2xl font-extrabold text-dark mb-2">Forgot Password?</h1>
        <p class="text-gray-500 text-sm">Enter your email and we'll send you a reset link.</p>
      </div>

      <!-- Success -->
      @if (successMessage()) {
        <div class="mb-6 p-4 bg-green-50 border border-green-200 rounded-2xl flex items-center gap-3">
          <svg class="w-5 h-5 text-green-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
          <span class="text-green-700 text-sm font-medium">{{ successMessage() }}</span>
        </div>
      }

      <!-- Error -->
      @if (errorMessage()) {
        <div class="mb-6 p-4 bg-red-50 border border-red-200 rounded-2xl flex items-center gap-3">
          <svg class="w-5 h-5 text-red-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span class="text-red-700 text-sm font-medium">{{ errorMessage() }}</span>
        </div>
      }

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="block text-xs font-bold text-dark uppercase tracking-wider mb-2">Email Address</label>
          <input
            formControlName="email"
            type="email"
            autocomplete="email"
            placeholder="username@esprit.tn"
            [class]="isFieldInvalid('email')
              ? 'w-full h-14 px-5 bg-white border-2 border-red-400 rounded-2xl text-sm font-semibold focus:ring-2 focus:ring-red-400/30 transition-all'
              : 'w-full h-14 px-5 bg-white/90 border-2 border-transparent rounded-2xl text-sm font-semibold hover:shadow-md focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all'">
          @if (isFieldInvalid('email')) {
            <p class="text-red-500 text-xs font-semibold mt-2">Please enter a valid email address.</p>
          }
        </div>

        <button
          type="submit"
          [disabled]="isLoading() || form.invalid"
          class="w-full h-14 bg-primary text-white rounded-2xl font-black text-base hover:bg-primary-dark hover:shadow-xl transition-all shadow-lg shadow-primary/25 disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center gap-2">
          @if (isLoading()) {
            <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Sending...
          } @else {
            Send Reset Link
          }
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-500">
        Remember your password?
        <a routerLink="/login" class="text-primary font-bold hover:underline ml-1">Back to Login</a>
      </p>
    </div>
  </div>
</div>
