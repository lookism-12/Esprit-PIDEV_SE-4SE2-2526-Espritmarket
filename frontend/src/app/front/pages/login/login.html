<div class="auth-dark-immersive min-h-screen flex items-center justify-center p-4">
    
    <!-- Outer Container -->
    <div class="relative w-full max-w-6xl aspect-[16/10] bg-white shadow-[0_100px_200px_-50px_rgba(0,0,0,0.15)] flex overflow-hidden rounded-[2.5rem] animate-fadeIn border border-gray-100">
        
        <!-- The Frame (Subtle) -->
        <div class="maroon-glowing-frame inset-6 rounded-[2.2rem] border-[3px]"></div>

        <!-- Left side: Form (45%) -->
        <div class="relative w-[45%] h-full flex flex-col justify-center px-16 lg:px-20 z-30">
            <div class="mb-8 group/header">
                <h1 class="text-gray-900 text-3xl font-extrabold mb-1 tracking-tight hover:text-[#800000] transition-all duration-300 cursor-default">Welcome Back</h1>
                <p class="text-gray-600 text-xs font-medium leading-relaxed italic">Sign in to <span class="text-[#800000] font-bold">ESPRIT Market</span></p>
            </div>

            <!-- Error Notification -->
            @if (errorMessage()) {
                <div class="mb-6 p-4 bg-red-50 border-l-4 border-red-600 rounded-xl animate-fadeIn">
                    <p class="text-red-700 text-xs font-bold">{{ errorMessage() }}</p>
                </div>
            }

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
                <!-- Email -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 px-1">EMAIL ADDRESS</label>
                    <input 
                        formControlName="email"
                        type="email" 
                        class="input-box"
                        [class.border-red-500]="isFieldInvalid('email')"
                        placeholder="username@esprit.tn">
                    <p *ngIf="isFieldInvalid('email')" class="text-[10px] text-red-600 font-bold px-1 animate-fadeIn">{{ getFieldError('email') }}</p>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 px-1">PASSWORD</label>
                    <div class="relative">
                        <input 
                            formControlName="password"
                            [type]="showPassword() ? 'text' : 'password'" 
                            class="input-box pr-14"
                            [class.border-red-500]="isFieldInvalid('password')"
                            placeholder="••••••••">
                        <p *ngIf="isFieldInvalid('password')" class="text-[10px] text-red-600 font-bold px-1 animate-fadeIn mt-1">{{ getFieldError('password') }}</p>
                        <button 
                            type="button" 
                            (click)="togglePassword()"
                            class="absolute right-6 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#800000] transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Checkbox & Forgot -->
                <div class="flex items-center justify-between px-1">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="w-4 h-4 rounded border-gray-200 text-[#800000] focus:ring-[#800000]">
                        <span class="text-sm text-gray-400 font-bold group-hover:text-gray-600 transition-colors">Remember me</span>
                    </label>
                    <a routerLink="/forgot-password" class="text-sm text-[#800000] font-extrabold hover:underline">Forgot password?</a>
                </div>

                <!-- Action Button -->
                <div class="pt-4">
                    <button 
                        type="submit"
                        [disabled]="isLoading()"
                        class="btn-auth-gradient">
                        <span *ngIf="!isLoading()">Sign in</span>
                        <div *ngIf="isLoading()" class="animate-spin rounded-full h-5 w-5 border-b-2 border-white mx-auto"></div>
                    </button>
                </div>

                <!-- Divider -->
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-white text-gray-600 font-bold uppercase tracking-widest text-[10px]">Or continue with</span>
                    </div>
                </div>

                <!-- Social Grid -->
                <div class="grid grid-cols-3 gap-4">
                    <button type="button" class="social-btn">
                        <img src="https://www.google.com/favicon.ico" class="w-5 h-5" alt="Google">
                    </button>
                    <button type="button" class="social-btn">
                        <img src="https://github.com/favicon.ico" class="w-5 h-5" alt="GitHub">
                    </button>
                    <button type="button" class="social-btn">
                        <img src="https://www.facebook.com/favicon.ico" class="w-5 h-5 shadow-sm" alt="Facebook">
                    </button>
                </div>
            </form>

            <div class="mt-4 text-center">
                <p class="text-xs text-gray-600 font-bold">Don't have an account yet? <a routerLink="/register" class="text-[#800000] font-extrabold hover:underline">Register for free</a></p>
            </div>
        </div>

        <!-- Right side: Media (55%) -->
        <div class="relative w-[55%] h-full overflow-hidden bg-black flex items-center justify-center">
            <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover opacity-80 scale-110">
                <source src="assets/Video Publicitaire.mp4" type="video/mp4">
            </video>
            <div class="absolute inset-0 bg-gradient-to-r from-white via-transparent to-transparent z-10 opacity-20"></div>
            <div class="absolute right-10 top-1/2 -translate-y-1/2 vertical-text text-[11px] font-black text-white/40 uppercase tracking-[1em] z-20">Esprit Market</div>
        </div>
    </div>
</div>
