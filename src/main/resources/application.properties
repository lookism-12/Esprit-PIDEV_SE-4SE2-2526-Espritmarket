server.port=8086

# MongoDB Atlas Cloud Connection
spring.data.mongodb.uri=mongodb+srv://admin:admin@espritmarket.pm6cdbe.mongodb.net/EspritMarket?retryWrites=true&w=majority
spring.data.mongodb.auto-index-creation=true

# JWT
# IMPORTANT: Change this secret before deploying to production.
# Must be at least 32 characters (256 bits) for HMAC-SHA256.
jwt.secret=ThisIsAStrongSecretKeyForJWT1234567890!!
jwt.expirationMs=86400000

# Admin seed account mongodb+srv://admin:admin@espritmarket.pm6cdbe.mongodb.net/?appName=EspritMarket
# Password used by DataInitializer to create the default admin on first run.
# Override via environment variable in production: ADMIN_PASSWORD=...
app.admin.password=Admin@1234

spring.jackson.serialization.fail-on-empty-beans=false

logging.level.esprit_market=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.data.mongodb=DEBUG