# Copy this file to application.properties and customize values
# application.properties is gitignored to avoid committing secrets

# Server
server.port=8086

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/espritmarket

# JWT - REQUIRED: secret must be at least 32 characters for HS256
# Generate a strong secret for production (e.g. openssl rand -base64 32)
jwt.secret=YOUR_JWT_SECRET_MIN_32_CHARACTERS_LONG
jwt.expirationMs=86400000

# SpringDoc / Swagger UI (defaults: /v3/api-docs, /swagger-ui.html)
